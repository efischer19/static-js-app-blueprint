<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="A static frontend application built with vanilla HTML, CSS, and JavaScript.">
  <title>Static JS App</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header role="banner">
    <h1>Static JS App</h1>
    <p>A minimal starter built with vanilla HTML, CSS, and JavaScript.</p>
  </header>

  <main role="main">
    <section aria-labelledby="welcome-heading">
      <h2 id="welcome-heading">Welcome</h2>
      <p>
        Edit <code>src/index.html</code>, <code>src/style.css</code>, and
        <code>src/script.js</code> to build your application.
      </p>
      <p>No build step required &mdash; open this file directly in a browser.</p>
    </section>
  </main>

  <footer role="contentinfo">
    <p>Built with the <a href="https://github.com/efischer19/static-js-app-blueprint">static-js-app-blueprint</a> template.</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
